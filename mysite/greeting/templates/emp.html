<!DOCTYPE html>
<html>
<head>
    <title>Employee Directory</title>
</head>
<body>

<h1>Employee Directory</h1>

{% if employees %}
    <ul>
        {% for emp in employees %}
            <li>
                <strong>{{ emp.name }}</strong> - {{ emp.job }} - ₹{{ emp.salary }}

                {% if emp.full_time %}
                    <span style="color: green;">(Full-Time)</span>
                {% else %}
                    <span style="color: red;">(Part-Time)</span>
                {% endif %}
            </li>
        {% endfor %}
    </ul>
{% else %}
    <p>No employees available.</p>
{% endif %}

</body>
</html>
